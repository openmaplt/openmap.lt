name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DATABASE_URL=postgresql://placeholder:placeholder@localhost:5432/placeholder

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        env:
          REPO_REF: ${{ github.ref_name }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: REPO_REF,REQUESTED_TAG
          script: |
            # Navigate to deployment directory
            cd ${{ secrets.DEPLOY_PATH || '/opt/openmap' }}

            # Always rewrite .env from secrets, so new vars propagate on every deploy
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
            echo "BASE_URL=https://openmap.lt" >> .env
            echo "IMAGE_TAG=$REQUESTED_TAG" >> .env

            # Pull latest docker-compose.prod.yml
            curl -o docker-compose.prod.yml "https://raw.githubusercontent.com/${{ github.repository }}/$REPO_REF/docker-compose.prod.yml"

            # Login to GitHub Container Registry
            echo ${{ secrets.GHCR_PAT }} | docker login ${{ env.REGISTRY }} -u paumas --password-stdin

            # Pull correct image tag
            docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$REQUESTED_TAG"
            
            # Stop and remove old container
            docker compose -f docker-compose.prod.yml down
            
            # Start new container
            docker compose -f docker-compose.prod.yml up -d
            
            # Clean up old images
            docker image prune -af
            
            # Show container status
            docker compose -f docker-compose.prod.yml ps
